services:
  mongo:
    image: mongo:7
    container_name: media-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: media-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  media-service:
    build: .
    container_name: intelligent-media-pipeline
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./src/storage/uploads:/app/src/storage/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  media-worker:
    build: .
    container_name: intelligent-media-worker
    command: npm run worker
    env_file:
      - .env
    volumes:
      - ./src/storage/uploads:/app/src/storage/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
